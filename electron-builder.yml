appId: com.lumos.app
productName: Lumos
publish:
  provider: github
  owner: zhangjunjesse
  repo: Lumos
directories:
  output: release
files:
  - dist-electron/**/*
  - "!node_modules"
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/prebuild-install/**/*
  - node_modules/file-uri-to-path/**/*
  - "!src"
  - "!electron"
  - "!.next"
  - "!build"
  - "!scripts"
  - "!docs"
  - "!release"
  - "!data"
extraResources:
  - from: .next/standalone/
    to: standalone/
    filter:
      - "**/*"
      - "!node_modules"
      - "!release"
  - from: .next/standalone/node_modules/
    to: standalone/node_modules/
    filter: ["**/*"]
  - from: .next/standalone/.next/
    to: standalone/.next/
    filter: ["**/*"]
  - from: .next/static/
    to: standalone/.next/static/
    filter: ["**/*"]
  - from: public/
    to: standalone/public/
    filter: ["**/*"]
  - from: build/
    to: .
    filter: ["icon.*"]
  - from: resources/feishu-mcp-server/
    to: feishu-mcp-server/
    filter: ["**/*"]
  - from: node_modules/@anthropic-ai/claude-agent-sdk/
    to: standalone/node_modules/@anthropic-ai/claude-agent-sdk/
    filter: ["**/*"]
  - from: resources/node-runtime/
    to: node-runtime/
    filter: ["**/*"]
  - from: resources/git-bash/
    to: git-bash/
    filter: ["**/*"]
# afterPack: scripts/after-pack.js  # Disabled: rebuild handled in CI workflow
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-${arch}.${ext}"
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
linux:
  icon: build/icon.png
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"
  desktop:
    entry:
      Name: Lumos
      Comment: Document intelligence assistant powered by AI
      Categories: Office;TextEditor;
      StartupWMClass: lumos
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]
