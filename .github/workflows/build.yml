name: Build & Package

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Delete existing release if it exists
          gh release delete "${GITHUB_REF_NAME}" -y || true
          # Create new draft release
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "Lumos v${VERSION}" \
            --notes "Building artifacts..."

  verify-source:
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 from source for current Node version
        run: |
          rm -rf node_modules/better-sqlite3/build
          npm_config_build_from_source=true npm rebuild better-sqlite3

      - name: Verify source
        run: npm run ci:verify

  build-windows:
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    needs: [create-release, verify-source]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Download runtime assets and build Next.js
        run: node scripts/download-node.mjs && node scripts/download-git-bash.mjs && npm run build

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -o better-sqlite3

      - name: Copy Electron-ABI native module into standalone
        shell: bash
        run: |
          SRC="node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          DEST=".next/standalone/node_modules/better-sqlite3/build/Release/"
          mkdir -p "$DEST"
          cp "$SRC" "$DEST"
          echo "Copied better_sqlite3.node ($(wc -c < "$SRC") bytes) into standalone"

      - name: Build Electron main process
        run: node scripts/build-electron.mjs

      - name: Package for Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --config electron-builder.yml --publish always

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release/*.exe
          retention-days: 1

  build-macos:
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    needs: [create-release, verify-source]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Download runtime assets and build Next.js
        run: node scripts/download-node.mjs && npm run build

      - name: Rebuild better-sqlite3 for Electron (arm64)
        run: npx electron-rebuild -f -o better-sqlite3 -a arm64

      - name: Copy Electron-ABI native module into standalone
        run: |
          SRC="node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          DEST=".next/standalone/node_modules/better-sqlite3/build/Release/"
          mkdir -p "$DEST"
          cp "$SRC" "$DEST"
          echo "Copied better_sqlite3.node ($(wc -c < "$SRC") bytes) into standalone"

      - name: Build Electron main process
        run: node scripts/build-electron.mjs

      - name: Package for macOS (arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --config electron-builder.yml --publish always

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-artifacts
          path: release/*.dmg
          retention-days: 1

  release:
    if: ${{ always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'skipped') }}
    needs: [verify-source, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and previous tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p' || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.meta.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            git log "$RANGE" --pretty=format:'| `%h` | %s |'
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PREV_TAG="${{ steps.meta.outputs.prev_tag }}"

          cat > release-notes.md << 'NOTES_EOF'
          ## Downloads

          **Windows**
          - **Lumos Setup ${{ steps.meta.outputs.version }}.exe** — Windows installer

          **macOS**
          - **Lumos-${{ steps.meta.outputs.version }}-arm64.dmg** — macOS Apple Silicon (M1/M2/M3/M4)

          ## Installation

          **Windows**: Download the exe installer, double-click to install.

          **macOS**:
          1. Download the DMG for your chip architecture
          2. Open the DMG, drag Lumos into Applications
          3. If you see a security prompt on first launch, go to **System Settings > Privacy & Security** and click "Open Anyway"
          4. Configure your Anthropic API Key in Settings

          ## Requirements

          - Windows 10+ / macOS 12.0+
          - Anthropic API Key or `ANTHROPIC_API_KEY` environment variable
          - Claude Code CLI recommended for code features

          ## Changelog
          NOTES_EOF

          if [ -n "$PREV_TAG" ]; then
            echo "" >> release-notes.md
            echo "| Commit | Description |" >> release-notes.md
            echo "|--------|-------------|" >> release-notes.md
            cat >> release-notes.md << 'CHANGELOG_INLINE_EOF'
          ${{ steps.changelog.outputs.changelog }}
          CHANGELOG_INLINE_EOF
          fi

          # Upload artifacts by platform to avoid conflicts
          gh release upload "${GITHUB_REF_NAME}" artifacts/windows-artifacts/* --clobber || true
          gh release upload "${GITHUB_REF_NAME}" artifacts/macos-arm64-artifacts/* --clobber || true

          # Update the draft release with full notes and publish
          # Note: For private repos, releases are private by default
          # Use --discussion-category to make it public (requires public releases enabled in repo settings)
          gh release edit "${GITHUB_REF_NAME}" \
            --title "Lumos v${VERSION}" \
            --notes-file release-notes.md \
            --latest \
            --draft=false
